<!DOCTYPE html>
<html lang="{{ site.language }}">
<head>
    <meta charset="utf-8">
    <title>{{ page.title }} — {{ site.title }}</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <header>
        <h1><a href="/">{{ site.title }}</a></h1>
    </header>
    <main>
        <figure>
            <img src="{{ content }}" alt="{{ page.title }}">
            <figcaption>{{ page.title }}</figcaption>
        </figure>
    </main>
</body>
</html>
